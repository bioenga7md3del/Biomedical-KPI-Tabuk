<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة مديري المواقع - تحديث أوامر العمل</title>
    
    <script>
        if(!sessionStorage.getItem('hospital_user')) {
            window.location.href = 'index.html';
        }
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <style>
        :root { --primary: #1e3a8a; --bg: #f1f5f9; --surface: #ffffff; --warn: #eab308; }
        * { box-sizing: border-box; outline: none; }
        body { font-family: 'Tajawal', sans-serif; background: var(--bg); color: #0f172a; margin: 0; padding: 0; }
        
        #appScreen { padding: 20px; max-width: 1300px; margin: 0 auto; }
        .header { background: var(--surface); padding: 20px 30px; border-radius: 12px; margin-bottom: 25px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 6px rgba(0,0,0,0.02); border: 1px solid #e2e8f0; }
        .header h1 { margin: 0; color: var(--primary); font-size: 1.6rem; }
        .btn-logout { background: #fee2e2; color: #dc2626; border: 1px solid #fca5a5; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; font-family: 'Tajawal'; display: flex; align-items: center; gap: 8px;}
        .btn-logout:hover { background: #fecaca; }

        .panel { background: var(--surface); padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); border: 1px solid #e2e8f0; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; text-align: right; }
        th, td { padding: 14px; border-bottom: 1px solid #e2e8f0; }
        th { background: #f8fafc; color: #475569; font-weight: 800; }
        tr:hover { background: #f8fafc; }
        
        .btn-update { background: #e0f2fe; color: #0284c7; border: 1px solid #bae6fd; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-family: 'Tajawal'; font-weight: bold; display: flex; align-items: center; gap: 6px; }
        .btn-update:hover { background: #bae6fd; }

        /* Modal السجل والتحديث */
        #commentModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: white; padding: 30px; border-radius: 12px; width: 90%; max-width: 500px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.2); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #e2e8f0; padding-bottom: 15px; }
        .history-box { background: #f8fafc; padding: 15px; border-radius: 8px; height: 180px; overflow-y: auto; margin-bottom: 20px; font-size: 0.95rem; border: 1px solid #cbd5e1; }
        .comment-item { margin-bottom: 10px; padding-bottom: 10px; border-bottom: 1px dashed #cbd5e1; }
        .comment-date { color: #64748b; font-size: 0.8rem; display: block; margin-bottom: 4px; }
        textarea { width: 100%; height: 90px; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; font-family: 'Tajawal'; resize: none; margin-bottom: 15px; font-size: 1rem; }
        .btn-save { background: #16a34a; color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; font-family: 'Tajawal'; width: 100%; font-size: 1.1rem; }
        
        .badge-done { background: #dcfce7; color: #16a34a; padding: 6px 10px; border-radius: 6px; font-size: 0.85rem; font-weight: bold; }
        .badge-warn { background: #fef08a; color: #854d0e; padding: 6px 10px; border-radius: 6px; font-size: 0.85rem; font-weight: bold; }
    </style>
</head>
<body>

    <div id="appScreen">
        <div class="header">
            <div>
                <h1>مرحباً، مستخدم: <span id="lblSiteName" style="color:#0284c7"></span></h1>
                <p style="margin: 5px 0 0; color: #64748b; font-weight: bold;">سجل الأوامر المتأخرة المخصصة لموقعك لتبرير أسباب التأخير</p>
            </div>
            <button class="btn-logout" onclick="window.logoutSite()"><i class="fas fa-sign-out-alt"></i> تسجيل الخروج للرئيسية</button>
        </div>

        <div class="panel">
            <table id="ordersTable">
                <thead>
                    <tr>
                        <th>رقم الأمر</th>
                        <th>تاريخ البلاغ / الاستحقاق</th>
                        <th style="width: 30%;">الجهاز الطبي</th>
                        <th>الفني المسند إليه</th>
                        <th>حالة التحديث</th>
                        <th>إجراءات</th>
                    </tr>
                </thead>
                <tbody>
                    <tr><td colspan="6" style="text-align: center; padding: 20px;"><i class="fas fa-spinner fa-spin"></i> جاري تحميل أوامر العمل الخاصة بموقعك...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <div id="commentModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 style="margin:0; color:#1e3a8a;">تحديث أمر: <span id="modalOrderId"></span></h3>
                <i class="fas fa-times" style="cursor: pointer; color: #dc2626; font-size: 1.5rem;" onclick="window.closeModal()"></i>
            </div>
            
            <label style="font-weight: bold; color: #475569; margin-bottom: 8px; display: block;">السجل التاريخي للردود:</label>
            <div class="history-box" id="modalHistory"></div>
            
            <label style="font-weight: bold; color: #475569; margin-bottom: 8px; display: block;">إضافة تحديث جديد لجلب الدعم الإداري:</label>
            <textarea id="modalNewComment" placeholder="اكتب أسباب تأخر الإصلاح (بانتظار قطع غيار، بلاغ للوكيل، إلخ)..."></textarea>
            
            <button class="btn-save" id="btnSaveComment"><i class="fas fa-save"></i> حفظ التبرير وإرساله حياً للأدمن</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs, doc, updateDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCG3bBrP1SWia50pnH1VS9behJ80M4BA6U",
            authDomain: "tabuk-medical-cmms.firebaseapp.com",
            projectId: "tabuk-medical-cmms",
            storageBucket: "tabuk-medical-cmms.firebasestorage.app",
            messagingSenderId: "756624281363",
            appId: "1:756624281363:web:919e8555b86eddecbb14e6",
            measurementId: "G-YV56L9QR5J"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // جلب الموقع الحالي المحفوظ من شاشة الدخول الموحدة
        const currentSite = sessionStorage.getItem('hospital_user');
        let currentEditingOrder = "";
        
        window.onload = function() {
            document.getElementById('lblSiteName').textContent = currentSite;
            loadSiteOrders();
        }

        async function loadSiteOrders() {
            const tb = document.querySelector('#ordersTable tbody');
            try {
                const q = query(collection(db, "pending_orders"), where("site", "==", currentSite), where("isCompleted", "==", false));
                const snapshot = await getDocs(q);
                
                let rowsHTML = "";
                
                if(snapshot.empty) {
                    tb.innerHTML = '<tr><td colspan="6" style="text-align: center; color:#16a34a; font-weight:bold; padding: 30px; font-size:1.1rem;"><i class="fas fa-check-circle"></i> رائع! لا توجد أي أوامر متأخرة أو نواقص معلقة لموقعك حالياً.</td></tr>';
                    return;
                }

                snapshot.forEach((docSnap) => {
                    const data = docSnap.data();
                    const commentsCount = data.comments ? data.comments.length : 0;
                    const statusBadge = commentsCount > 0 
                        ? `<span class="badge-done"><i class="fas fa-check"></i> تم التحديث</span>`
                        : `<span class="badge-warn"><i class="fas fa-exclamation-circle"></i> بانتظار الإفادة</span>`;

                    rowsHTML += `
                        <tr>
                            <td style="font-weight:bold; font-size:1.05rem;">${data.id}</td>
                            <td style="direction:ltr;">${data.startDate || 'غير محدد'}</td>
                            <td title="${data.device}">${data.device.substring(0, 45)}...</td>
                            <td>${data.tech}</td>
                            <td>${statusBadge}</td>
                            <td>
                                <button class="btn-update" onclick="window.openModal('${docSnap.id}')">
                                    <i class="fas fa-pen"></i> تحديث مبرر
                                </button>
                            </td>
                        </tr>
                    `;
                });

                tb.innerHTML = rowsHTML;
                window.siteData = snapshot.docs.map(d => ({id: d.id, ...d.data()}));

            } catch (error) {
                console.error(error);
                tb.innerHTML = '<tr><td colspan="6" style="text-align: center; color:red; padding: 20px;">حدث خطأ أثناء تحميل البيانات المباشرة.</td></tr>';
            }
        }

        window.openModal = function(orderId) {
            currentEditingOrder = orderId;
            document.getElementById('modalOrderId').textContent = orderId;
            document.getElementById('modalNewComment').value = "";
            
            const orderData = window.siteData.find(o => o.id === orderId);
            const historyBox = document.getElementById('modalHistory');
            
            if (orderData.comments && orderData.comments.length > 0) {
                historyBox.innerHTML = orderData.comments.map(c => `
                    <div class="comment-item">
                        <span class="comment-date"><i class="fas fa-clock"></i> ${c.date}</span>
                        <strong style="color: #0f172a;">${c.text}</strong>
                    </div>
                `).join('');
            } else {
                historyBox.innerHTML = '<div style="color:#94a3b8; text-align:center; padding-top:40px;">لا توجد مبررات سابقة مسجلة لهذا الأمر.</div>';
            }

            document.getElementById('commentModal').style.display = 'flex';
        }

        window.closeModal = function() {
            document.getElementById('commentModal').style.display = 'none';
        }

        document.getElementById('btnSaveComment').addEventListener('click', async () => {
            const text = document.getElementById('modalNewComment').value.trim();
            if(!text) { alert("الرجاء كتابة نص التحديث أولاً"); return; }

            const btn = document.getElementById('btnSaveComment');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري إرسال البيانات...';

            try {
                const orderRef = doc(db, "pending_orders", currentEditingOrder);
                const newComment = {
                    text: text,
                    date: new Date().toLocaleString('ar-EG', { dateStyle: 'medium', timeStyle: 'short' }),
                    author: currentSite
                };

                await updateDoc(orderRef, { comments: arrayUnion(newComment) });

                window.closeModal();
                loadSiteOrders(); 

            } catch (error) {
                console.error(error);
                alert("حدث خلل أثناء الرفع، تحقق من اتصال السيرفر.");
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-save"></i> حفظ التبرير وإرساله حياً للأدمن';
            }
        });

        // دالة تسجيل الخروج المعدلة لتعيدك فوراً إلى صفحة المؤشرات الرئيسية (index.html)
        window.logoutSite = function() {
            sessionStorage.removeItem('hospital_user');
            window.location.href = 'index.html'; 
        }
    </script>
</body>
</html>
