<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة صلاحيات المواقع - C-Panel</title>
    
    <script>
        if(sessionStorage.getItem('cpanel_auth') !== 'true') {
            window.location.href = 'admin.html';
        }
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <style>
        :root { --primary: #eab308; --bg: #f1f5f9; --surface: #ffffff; }
        * { box-sizing: border-box; outline: none; }
        body { font-family: 'Tajawal', sans-serif; background: var(--bg); color: #334155; margin: 0; padding: 40px; }
        
        .container { max-width: 900px; margin: 0 auto; }
        .header-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .btn-back { background: #0f172a; color: white; padding: 8px 15px; border-radius: 6px; text-decoration: none; font-weight: bold; border: 1px solid #cbd5e1; display: inline-flex; align-items: center; gap: 8px; }
        .btn-back:hover { background: #1e293b; }

        .card { background: var(--surface); padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); border: 1px solid #e2e8f0; border-top: 5px solid var(--primary); margin-bottom: 20px; }
        h1 { margin-top: 0; color: #0f172a; }

        /* نموذج الإضافة */
        .add-form { display: flex; gap: 15px; background: #f8fafc; padding: 20px; border-radius: 8px; border: 1px solid #cbd5e1; align-items: flex-end; flex-wrap: wrap; }
        .form-group { flex: 1; min-width: 250px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; color: #475569; }
        .form-control { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; font-family: 'Tajawal'; font-size: 1rem; background: white; }
        .btn-add { background: #16a34a; color: white; border: none; padding: 11px 25px; border-radius: 6px; font-family: 'Tajawal'; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 8px; font-size: 1rem; }
        .btn-add:hover { background: #15803d; }

        /* جدول المواقع */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 15px; border-bottom: 1px solid #e2e8f0; text-align: right; }
        th { background: #f8fafc; color: #0f172a; font-weight: 800; }
        tr:hover { background: #f8fafc; }
        
        .btn-delete { background: #fee2e2; color: #dc2626; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-family: 'Tajawal'; font-weight: bold; }
        .btn-delete:hover { background: #fca5a5; }
        
        #statusMsg { font-weight: bold; margin-top: 15px; display: block; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header-nav">
            <h2 style="margin: 0; color: #854d0e;"><i class="fas fa-key"></i> إدارة صلاحيات المواقع</h2>
            <a href="admin.html" class="btn-back"><i class="fas fa-arrow-right"></i> العودة للوحة التوجيه</a>
        </div>

        <div class="card">
            <h1>تخصيص كلمة مرور للموقع</h1>
            <p style="color: #64748b;">يتم سحب أسماء المواقع أدناه تلقائياً من أوامر العمل المرفوعة في قاعدة البيانات لضمان عدم وجود أخطاء إملائية.</p>
            
            <div class="add-form">
                <div class="form-group">
                    <label>اختر الموقع المكتشف في السيرفر</label>
                    <select id="siteNameSelect" class="form-control">
                        <option value="">-- جاري تحميل المواقع من السيرفر... --</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>تعيين كلمة المرور</label>
                    <input type="text" id="sitePass" class="form-control" placeholder="اكتب كلمة مرور للموقع">
                </div>
                <button class="btn-add" id="btnAddSite"><i class="fas fa-save"></i> حفظ وصلاحية</button>
            </div>
            <span id="statusMsg"></span>
        </div>

        <div class="card">
            <h2 style="margin-top:0;">المستشفيات والمواقع المفعلة حالياً</h2>
            <table>
                <thead>
                    <tr>
                        <th>اسم الموقع</th>
                        <th>كلمة المرور المشتركة</th>
                        <th>حالة الحساب</th>
                        <th>إجراءات</th>
                    </tr>
                </thead>
                <tbody id="sitesTableBody">
                    <tr><td colspan="4" style="text-align:center;"><i class="fas fa-spinner fa-spin"></i> جاري تحميل البيانات...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, query, orderBy, where } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCG3bBrP1SWia50pnH1VS9behJ80M4BA6U",
            authDomain: "tabuk-medical-cmms.firebaseapp.com",
            projectId: "tabuk-medical-cmms",
            storageBucket: "tabuk-medical-cmms.firebasestorage.app",
            messagingSenderId: "756624281363",
            appId: "1:756624281363:web:919e8555b86eddecbb14e6",
            measurementId: "G-YV56L9QR5J"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const statusMsg = document.getElementById('statusMsg');
        const btnAddSite = document.getElementById('btnAddSite');
        const sitesTableBody = document.getElementById('sitesTableBody');
        const siteNameSelect = document.getElementById('siteNameSelect');

        // 1. دالة جلب المواقع الفريدة من كوليكشن الأوامر المفتوحة لملء القائمة المنسدلة
        async function loadUniqueSitesFromDB() {
            try {
                // جلب الأوامر المفتوحة لاستخراج أسماء المستشفيات منها
                const q = query(collection(db, "pending_orders"), where("isCompleted", "==", false));
                const querySnapshot = await getDocs(q);
                
                const uniqueSites = new Set();
                querySnapshot.forEach(doc => {
                    const data = doc.data();
                    if(data.site) uniqueSites.add(data.site);
                });

                siteNameSelect.innerHTML = '<option value="">-- اختر المستشفى/الموقع --</option>';
                
                if(uniqueSites.size === 0) {
                    siteNameSelect.innerHTML = '<option value="">⚠️ لا توجد أوامر مفتوحة بالسيرفر لاستخراج المواقع</option>';
                    return;
                }

                // ترتيب المواقع أبجدياً وإضافتها للقائمة
                [...uniqueSites].sort().forEach(site => {
                    siteNameSelect.insertAdjacentHTML('beforeend', `<option value="${site}">${site}</option>`);
                });

            } catch (e) {
                console.error(e);
                siteNameSelect.innerHTML = '<option value="">❌ فشل جلب المواقع من قاعدة البيانات</option>';
            }
        }

        // 2. دالة حفظ الصلاحية وبثها للسيرفر
        btnAddSite.addEventListener('click', async () => {
            const name = siteNameSelect.value;
            const pass = document.getElementById('sitePass').value.trim();

            if(!name || !pass) {
                statusMsg.innerHTML = '<span style="color:#dc2626">❌ الرجاء اختيار الموقع وتحديد كلمة المرور</span>';
                return;
            }

            // التحقق من أن الموقع لم يتم إضافة باسورد له من قبل لمنع التكرار
            const checkQ = query(collection(db, "sites_auth"), where("siteName", "==", name));
            const checkSnapshot = await getDocs(checkQ);
            if(!checkSnapshot.empty) {
                statusMsg.innerHTML = '<span style="color:#dc2626">❌ هذا الموقع مضاف بالفعل في القائمة بالأسفل، يمكنك حذفه وإعادة إضافته لتغيير الباسورد</span>';
                return;
            }

            btnAddSite.disabled = true;
            statusMsg.innerHTML = '<span style="color:#0284c7"><i class="fas fa-spinner fa-spin"></i> جاري ربط الصلاحية...</span>';

            try {
                await addDoc(collection(db, "sites_auth"), {
                    siteName: name,
                    password: pass,
                    createdAt: new Date().toISOString()
                });

                statusMsg.innerHTML = '<span style="color:#16a34a">✅ تم تفعيل حساب الموقع بنجاح!</span>';
                document.getElementById('sitePass').value = '';
                siteNameSelect.value = '';
                
                loadSitesList(); 

            } catch(e) {
                console.error(e);
                statusMsg.innerHTML = '<span style="color:#dc2626">❌ حدث خطأ أثناء الاتصال بالسيرفر</span>';
            }
            btnAddSite.disabled = false;
        });

        // 3. دالة جلب وعرض قائمة الحسابات المفعلة
        async function loadSitesList() {
            try {
                const q = query(collection(db, "sites_auth"), orderBy("createdAt", "desc"));
                const querySnapshot = await getDocs(q);
                
                sitesTableBody.innerHTML = '';
                
                if(querySnapshot.empty) {
                    sitesTableBody.innerHTML = '<tr><td colspan="4" style="text-align:center; color:#64748b;">لا توجد حسابات مستخدمين مفعلة حالياً.</td></tr>';
                    return;
                }

                querySnapshot.forEach((docSnap) => {
                    const data = docSnap.data();
                    sitesTableBody.insertAdjacentHTML('beforeend', `
                        <tr>
                            <td style="font-weight:700; color:#1e3a8a;">${data.siteName}</td>
                            <td style="font-family:monospace; font-size:1.1rem; background:#f1f5f9; padding:5px 10px; border-radius:4px; display:inline-block; margin-top:10px; font-weight:bold; color:#0f172a;">${data.password}</td>
                            <td><span style="background:#dcfce7; color:#166534; padding:4px 8px; border-radius:4px; font-size:0.8rem; font-weight:bold;"><i class="fas fa-check"></i> جاهز للدخول</span></td>
                            <td>
                                <button class="btn-delete" onclick="window.deleteSite('${docSnap.id}')"><i class="fas fa-trash"></i> إلغاء الصلاحية</button>
                            </td>
                        </tr>
                    `);
                });
            } catch(e) {
                console.error(e);
                sitesTableBody.innerHTML = '<tr><td colspan="4" style="text-align:center; color:#dc2626;">خطأ في تحميل قائمة الصلاحيات.</td></tr>';
            }
        }

        // 4. دالة حذف الحساب
        window.deleteSite = async function(docId) {
            if(confirm('هل أنت متأكد من إلغاء صلاحية هذا الموقع؟ لن يتمكن المدير من تسجيل الدخول.')) {
                try {
                    await deleteDoc(doc(db, "sites_auth", docId));
                    loadSitesList();
                } catch(e) {
                    alert('حدث خطأ!');
                    console.error(e);
                }
            }
        }

        // تشغيل الدوال عند فتح الشاشة تلقائياً
        window.onload = function() {
            loadUniqueSitesFromDB();
            loadSitesList();
        }
    </script>
</body>
</html>
